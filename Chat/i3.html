<style>

<h1><a href="" style="color: #000000; text-decoration:none;">Chat</a></h1>

<body>
  <div class="chat-container">
    <div class="chat-box" id="chatBox"></div>
    <div class="input-container">
        <button id="sendButton">Rec</button>
        <input type="text" id="userInput" class="input-field" placeholder="Type a message...">
        <button class="send-button" id="sendMessageButton" >Send</button>
    </div>
  </div>

  <!-- OpenAI API key input field -->
  <div class="openaiapi-key-container">
    <label for="openai_api_key">OpenAI API Key:</label>
    <input type="password" id="openai_api_key" class="input-field">
    <button onclick="toggle_openai_api_key_visibility()">👁️</button>
  </div>

  <!-- read-only input for Assistant ID -->
  <div class="assistant-id-container">
    <label for="assistantId">assistant id:</label>
    <input type="text" id="assistantId" class="input-field" readonly>
  </div>

  <!-- read-only input for assistant thread id -->
  <div class="assistant-thread-container">
    <label for="assistantThreadId">thread id:</label>
    <input type="text" id="assistantThreadId" class="input-field" readonly>
  </div>

  <!-- read-only input for Assistant status -->
  <div class="assistant-run-status-container">
    <label for="assistantRunStatus">run status:</label>
    <input type="text" id="assistantRunStatus" class="input-field" readonly>
  </div>

  <!-- MAVLink connection button -->
  <div class="mavlink-connection-container">
      <label for="MAVLinkConnection">MAVLink Connect:</label>
      <input type="text" id="mavlink-connect-url" class="input-field" value="ws://127.0.0.1:56781" readonly>
      <button id="mavlink-connect-button">Connect</button>
  </div>

  <!-- MAVLink arming button -->
  <div class="mavlink-arm-container">
      <label for="mavlink-arm-vehicle">Arm Vehicle</label>
      <button id="mavlink-arm-button">Arm</button>
  </div>

  <!-- MAVLink guided mode button -->
    <div class="mavlink-guided-container">
        <label for="mavlink-guided-vehicle">Guided Mode</label>
        <button id="mavlink-guided-button">Guided</button>
    </div>

  <!-- debug output text box -->
  <div class="debug-output-container">
      <textarea id="debugOutput" class="input-field" rows="10" readonly></textarea>
  </div>

  <!-- simple script functions local to this page -->
  <script type="module">
    // imports
    import { mavlink_store } from './MAVLink/mavlink_store.js';

    // show/hide the OpenAI API key field
    function toggle_openai_api_key_visibility() {
        let openai_key_input = document.getElementById("openai_api_key");
        openai_key_input.type = openai_key_input.type === "password" ? "text" : "password";
    }

    // MAVLink connection related functions
    let connect_button = document.getElementById("mavlink-connect-button");
    let is_connected = false; // connection state
    // let mavlink_ws = null; // websocket object
    
    let mavlink_sysid = 254; // system id
    let mavlink_compid = MAVLink20Processor.MAV_COMP_ID_MISSIONPLANNER; // component id
    // let MAVLink = new MAVLink20Processor(null, mavlink_sysid, mavlink_compid);
    
    window.mavlink_ws = null; // Make them globally accessible
    window.MAVLink = new MAVLink20Processor(null, mavlink_sysid, mavlink_compid);

    // toggle connection state (called by Connect/Disconnect button)
    function mavlink_toggle_connect() {
        if (is_connected) {
            mavlink_disconnect();
        } else {
            mavlink_connect();
        }
    }

    // attach event listener to the connect button
    if (connect_button) {
        connect_button.addEventListener("click", mavlink_toggle_connect);
    }

    // set the mavlink button connection state
    function mavlink_set_connect_state(connected) {
        is_connected = connected;
        if (connected) {
            connect_button.innerText = "Disconnect";
        } else {
            connect_button.innerText = "Connect";
        }
    }

    // connect to the vehicle
    function mavlink_connect() {
        // check connection URL
        let connect_url = document.getElementById("mavlink-connect-url").value;
        if (!connect_url) {
            alert("Error: WebSocket URL is empty");
            return;
        }

        if (mavlink_ws == null) {
            // create a new websocket connection
            mavlink_ws = new WebSocket(connect_url);
            mavlink_ws.binaryType = "arraybuffer"

            // set up event handlers
            mavlink_ws.onopen = function() {
                mavlink_set_connect_state(true);
            };
            mavlink_ws.onclose = function() {
                mavlink_set_connect_state(false);
            };
            mavlink_ws.onerror = function() {
                mavlink_disconnect();
            };

            // parse incoming message and forward
            mavlink_ws.onmessage = (msg) => {
                // sanity check parser has been created
                if (MAVLink == null) {
                    return;
                }
                // parse message
                for (const char of new Uint8Array(msg.data)) {
                    const mavlink_msg = MAVLink.parseChar(char)
                    if ((mavlink_msg != null) && (mavlink_msg._id != -1)) {
                        // got a message with a known ID
                        mavlink_msg_handler(mavlink_msg);
                    }
                }
            }
        }
    }

    // disconnect from the vehicle
    function mavlink_disconnect() {
        if (mavlink_ws != null) {
            mavlink_ws.close();
            mavlink_ws = null;
        }
    }

    // mavlink message handler
    function mavlink_msg_handler(msg) {

        // sanity check msg
        if (msg == null || msg._id == null) {
            return;
        }

        // store the message in the message store
        mavlink_store.store_message(msg);

        switch (msg._id) {
            case 0: // HEARTBEAT
                //alert("custom mode:" + msg.custom_mode);
                //alert("Got a heartbeat: " + JSON.stringify(msg));
                break;
            case 1: // SYS_STATUS
                //alert("Got a system status: " + JSON.stringify(msg));
                break;
            case 24: // GPS_RAW_INT
                //alert("Got a GPS raw int: " + JSON.stringify(msg));
                break;
            case 30: // ATTITUDE
                //alert("Got an attitude: " + JSON.stringify(msg));
                break;
            case 33: // GLOBAL_POSITION_INT
                //alert("Got a global position int: " + JSON.stringify(msg));
                break;
            case 35: // HIGHRES_IMU
                //alert("Got a high resolution IMU: " + JSON.stringify(msg));
                break;
            case 42: // NAMED_VALUE_FLOAT
                //alert("Got a named value float: " + JSON.stringify(msg));
                break;
            case 74: // VFR_HUD
                //alert("Got a VFR HUD: " + JSON.stringify(msg));
                break;
            case 253: // STATUSTEXT
                //alert("Got a status text: " + JSON.stringify(msg));
                break;
            default:
                //alert("Got a message id: " + JSON.stringify(msg));
                break;
        }
    }

    // arm the vehicle
    function mavlink_arm_vehicle() {
        if (mavlink_ws == null || mavlink_ws.readyState !== WebSocket.OPEN) {
            alert("Please connect to the vehicle first");
            return;
        }
        // construct the ARM command using COMMAND_LONG
        let command_long_msg = new mavlink20.messages.command_long(
            1,   // Target system ID
            1,  // Target component ID
            400,             // MAV_CMD_COMPONENT_ARM_DISARM (command ID 400)
            1,               // Confirmation
            1,               // Param1: 1 to arm, 0 to disarm
            0, 0, 0, 0, 0, 0 // Unused parameters
        );

        const buffer = MAVLink.send(command_long_msg)
        const uint = new Uint8Array(buffer)

        // send the message as an ArrayBuffer over the WebSocket
        if (mavlink_ws && mavlink_ws.readyState === WebSocket.OPEN) {
            mavlink_ws.send(uint);
            add_text_to_debug("Sent ARM command via MAVLink");
        } else {
            alert("WebSocket is not open. Cannot send ARM command.");
        }
    }
    // attach event listener to the arm button
    document.getElementById("mavlink-arm-button").addEventListener("click", mavlink_arm_vehicle);


    /////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////
    // switch to guided mode
function mavlink_switch_to_guided() {
    if (mavlink_ws == null || mavlink_ws.readyState !== WebSocket.OPEN) {
        alert("Please connect to the vehicle first");
        return;
    }
    
    // Use command_long message for mode change (command 176: MAV_CMD_DO_SET_MODE)
    let command_long_msg = new mavlink20.messages.command_long(
        1,    // Target system ID
        1,    // Target component ID
        176,  // MAV_CMD_DO_SET_MODE
        1,    // Confirmation
        1,    // Param1: set to 1 for MAV_MODE_FLAG_CUSTOM_MODE_ENABLED
        4,    // Param2: 4 is GUIDED mode for Copter
        0, 0, 0, 0, 0    // Unused parameters
    );

    const buffer = MAVLink.send(command_long_msg);
    const uint = new Uint8Array(buffer);

    // send the message as an ArrayBuffer over the WebSocket
    if (mavlink_ws && mavlink_ws.readyState === WebSocket.OPEN) {
        mavlink_ws.send(uint);
        add_text_to_debug("Sent GUIDED mode command via MAVLink");
    } else {
        alert("WebSocket is not open. Cannot send GUIDED mode command.");
    }
}
// attach event listener to the guided mode button
document.getElementById("mavlink-guided-button").addEventListener("click", mavlink_switch_to_guided);
///////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////

    // add text to debug text box
    function add_text_to_debug(text) {
        let debugOutput = document.getElementById("debugOutput");
        debugOutput.value += text + "\n";
        debugOutput.scrollTop = debugOutput.scrollHeight;
    }

/////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////
    // Global variable to store wakeup timers
    const wakeup_timers = [];

    // Then implement set_wakeup_timer
    function set_wakeup_timer(args) {
        // Parse arguments if needed
        if (typeof args === 'string') {
            try {
                args = JSON.parse(args);
            } catch (e) {
                return "Error: Invalid arguments format";
            }
        }
        
        // Check required arguments
        const seconds = args?.seconds;
        if (seconds === undefined || seconds < 0) {
            return "Error: seconds not specified or invalid";
        }
        
        const message = args?.message;
        if (!message) {
            return "Error: message not specified";
        }
        
        // Create a unique ID for the timer
        const timer_id = Date.now().toString() + Math.random().toString(36).substr(2, 5);
        
        // Calculate expiry time
        const expiry_time = new Date(Date.now() + seconds * 1000);
        
        // Create timer object
        const timer = {
            id: timer_id,
            seconds: seconds,
            message: message,
            created_time: new Date(),
            expiry_time: expiry_time
        };
        
        // Add to wakeup schedule
        wakeup_timers.push(timer);
        
        // Set the JavaScript timeout
        setTimeout(() => {
            // Add message to chat
            const chatBox = document.getElementById("chatBox");
            const messageDiv = document.createElement("div");
            messageDiv.className = "user-text";
            messageDiv.textContent = "WAKEUP:" + message;
            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
            
            add_text_to_debug("Wakeup timer triggered: " + message);
            
            // Remove from wakeup schedule
            const index = wakeup_timers.findIndex(t => t.id === timer_id);
            if (index !== -1) {
                wakeup_timers.splice(index, 1);
            }
        }, seconds * 1000);
        
        return "Wakeup timer set for " + seconds + " seconds from now with message: " + message;
    }

    ///////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////
</script>

<script type="module">
  // error handling
  window.onerror = function(msg, url, linenumber) {
      alert('Sorry, something went wrong.\n\n' + 
            'Please try a hard reload of this page to clear its cache.\n\n' +
            'If the error persists open an issue on the GitHub repo.\n' +
            'Include a copy of the log and the following error message:\n\n' +
            msg + '\n' +
            'URL: '+ url +'\n' +
            'Line Number: '+ linenumber)
      return false
  }
  window.addEventListener('unhandledrejection', function (e) {
      throw new Error(e.reason.stack)
  })

  // imports
  import OpenAI from 'https://cdn.jsdelivr.net/npm/openai@4.85.4/+esm'
  import EventEmitter from 'https://cdn.jsdelivr.net/npm/eventemitter3@5.0.1/+esm'
  import { mavlink_store } from './MAVLink/mavlink_store.js';

  // constants
  const OPENAI_API_KEY = ""; // replace with your OpenAI API key
  const OPENAI_MODEL = "gpt-4o"
  const OPENAI_ASSISTANT_NAME = "ArduPilot Vehicle Control via MAVLink"

  // global variables
  let openai = null
  let openai_assistant_id = null
  let openai_thread_id = null
  let openai_event_handler = null

  // chat listener for user input and enter key
  document.getElementById("userInput").addEventListener("keypress", function(event) {
      if (event.key === "Enter") {
          send_message();
      }
  })
  // listener for send message button click
  document.getElementById("sendMessageButton").addEventListener("click", send_message);

  // get openai API key (use this in API calls)
  function get_openai_api_key() {
      if (OPENAI_API_KEY.length > 0) {
          return OPENAI_API_KEY;
      }
      return document.getElementById("openai_api_key").value.trim();
  }

  // check connection
  check_connection();

  // add text to chat box
  function add_text_to_chat(text, role = "assistant") {
      let div_class = role === "assistant" ? "assistant-text" : "user-text";
      let chatBox = document.getElementById("chatBox");

      if (role === "assistant") {
          // try to find the last assistant message and append to it
          let last_message = chatBox.querySelector(`.${div_class}:last-of-type`);
          if (last_message) {
              last_message.textContent += text;
              chatBox.scrollTop = chatBox.scrollHeight;
              return;
          }
      }

      // create a new message div if no previous assistant message exists
      let message_div = document.createElement("div");
      message_div.className = div_class;
      message_div.textContent = text;
      chatBox.appendChild(message_div);
      chatBox.scrollTop = chatBox.scrollHeight;
  }

  // add text to debug text box
  function add_text_to_debug(text) {
      let debugOutput = document.getElementById("debugOutput");
      debugOutput.value += text + "\n";
      debugOutput.scrollTop = debugOutput.scrollHeight;
  }

  // send message to AI assistant, get response and place in chat box text area
  async function send_message() {
      // check connection to OpenAI
      if (!(await check_connection())) {
          return;
      }

      let userInput = document.getElementById("userInput").value;
      if (!userInput.trim()) return;

      // display user input and clear input field
      add_text_to_chat(userInput, "user");
      document.getElementById("userInput").value = "";

      // fetch response from assistant
      let response = await get_assistant_response(userInput);

      // display assistant response
      add_text_to_chat(response, "assistant");
  }

  //
  // methods below here interact directly with the OpenAI API
  //

  // check connection to OpenAI API and return true on succes, false on failure
  async function check_connection() {
      // check openai API key
      if (!get_openai_api_key()) {
          return false;
      }
      // check openai connection
      if (!openai) {
          openai = new OpenAI({apiKey: get_openai_api_key(), dangerouslyAllowBrowser: true});
          if (!openai) {
              return false;
          }
      }

      // return immediately if assistant id has already been found
      if (openai_assistant_id) {
          return true
      }

      let assistantId = await find_assistant(OPENAI_ASSISTANT_NAME);
      if (assistantId) {
          // store assistant id
          openai_assistant_id = assistantId
          document.getElementById("assistantId").value = assistantId;

          // create a new thread
          openai_thread_id = await create_thread();
          if (!openai_thread_id) {
              alert("Error: Unable to create a new OpenAI thread");
              return false;
          }
          // print thread id on the page
          document.getElementById("assistantThreadId").value = openai_thread_id;

          // setup event handler
          openai_event_handler = new EventHandler(openai)
          if (!openai_event_handler) {
              alert("Error: Unable to create event handler");
              return false;
          }
          openai_event_handler.on("event", openai_event_handler.onEvent.bind(openai_event_handler))
          return true;
      } else {
          alert("Error: Assistant not found. Please check your OpenAI API key and assistant name");
          return false;
      }
  }

  // get assistant response based on user input
  async function find_assistant(assistant_name) {
      // sanity check openai connection
      if (!openai) {
          return null;
      }

      try {
          // get a list of all assistants
          const assistants_list = await openai.beta.assistants.list({order: "desc", limit: 20});

          // iterate through assistants and find the one with the matching name
          let assistant = assistants_list.data.find(a => a.name === assistant_name);

          // return assistant ID if found, otherwise return null
          return assistant ? assistant.id : null;
      } catch (error) {
          // return null in case of an error
          return null;
      }
  }

  // create a new thread
  // returns thread id on success, null on failure
  async function create_thread() {
    // sanity check the assistant id
    if (!openai_assistant_id) {
        return null;
    }

    try {
        // create a thread
        const new_thread = await openai.beta.threads.create();
        return new_thread ? new_thread.id : null;
    } catch (error) {
        return null;
    }
  }

  // get assistant response based on user input
  async function get_assistant_response(input) {
      // sanity check the assistant id
      if (!openai_assistant_id) {
          return "get_assistant_response: assistant not found";
      }
      // sanity check thread
      if (!openai_thread_id) {
          return "get_assistant_response: thread not found";
      }

      // add a message to the thread
      const message = await openai.beta.threads.messages.create(openai_thread_id, { role: "user", content: input });

      // run the assistant
      const stream = await openai.beta.threads.runs.stream(openai_thread_id, { assistant_id: openai_assistant_id, stream: true })
      stream.on('event', (event) => openai_event_handler.emit("event", event))
  }

  // handle function call from assistant
  function handle_function_call(name, args) {
      add_text_to_debug("Function call: " + name + " with args: " + JSON.stringify(args));
      // call the function
      switch (name) {
          case "get_vehicle_type":
              // get the vehicle type (e.g. Copter, Plane, Rover, Boat, etc)
              return get_vehicle_type();
          case "get_parameter":
              // Get a vehicle parameter's value.  The full list of available parameters and their values is available using the get_all_parameters function
              return get_parameter(args);
          case "get_wakeup_timers":
              // Retrieves a list of all active wakeup timers. You can optionally provide a message parameter to filter timers by their associated messages. When specifying the message parameter, you can use regular expressions (regex) to match patterns within the timer messages. This is useful when you want to find timers with specific keywords or patterns in their messages. For example, to retrieve all timers containing the word 'hello', you can use the regex '.*hello.*', where the dot-star (.*) pattern matches any character sequence.
              return get_wakeup_timers(args);
          case "get_vehicle_location_and_yaw":
              // Get the vehicle's current location including latitude, longitude, altitude above sea level and altitude above home
              return get_vehicle_location_and_yaw();
          case "send_mavlink_set_position_target_global_int":
              // Send a mavlink SET_POSITION_TARGET_GLOBAL_INT message to the vehicle.  This message is the preferred way to command a vehicle to fly to a specified location or to fly at a specfied velocity
              // fallthrough
          case "get_vehicle_state":
              // Get the vehicle state including armed status and (flight) mode
              return get_vehicle_state();
          case "get_location_plus_offset":
              // Calculate the latitude and longitude given an existing latitude and longitude and distances (in meters) North and East
              return get_location_plus_offset(args);

          case "send_mavlink_command_int":
              // Send a mavlink COMMAND_INT message to the vehicle.  Available commands including changing the flight mode, arming, disarming, takeoff and commanding the vehicle to fly to a specific location
              return send_mavlink_command_int(args);
          case "get_location_plus_dist_at_bearing":
              // Calculate the latitude and longitude given an existing latitude and longitude and a distance in meters and a bearing in degrees
              return get_location_plus_dist_at_bearing(args);
          case "get_parameter_description":
              // Get vehicle parameter descriptions including description, units, min and max
              return get_parameter_description()
          case "delete_wakeup_timers":
              // Delete all active wakeup timers. You can optionally provide a message parameter to filter which timers will be deleted based on their message. When specifying the message parameter, you can use regular expressions (regex) to match patterns within the timer messages. This is useful when you want to delete timers with specific keywords or patterns in their message. For example, to delete all timers containing the word 'hello', you can use the regex '.*hello.*', where the dot-star (.*) pattern matches any character sequence.
              // fallthrough
          case "set_parameter":
              // Set a vehicle parameter's value.  The full list of parameters is available using the get_all_parameters function
              return set_parameter(args);
          case "get_mavlink_message":
              // Get a mavlink message including all fields and values sent by the vehicle.  The list of available messages can be retrieved using the get_available_mavlink_messages
              add_text_to_debug("Unknown function: " + name);
              return "Unknown function: " + name;
          case "get_current_datetime":
              // Get the current date and time, e.g. 'Saturday, June 24, 2023 6:14:14 PM
              return getFormattedDate();
          case "get_mode_mapping":
              // Get a list of mode names to mode numbers available for this vehicle.  If the name or number parameter is provided only that mode's name and number will be returned.  If neither name nor number is provided the full list of available modes will be returned
              return get_mode_mapping(args);
          case "get_all_parameters":
              // Get all available parameter names and values
              return get_all_parameters();
          case "set_wakeup_timer":
              // Set a timer to wake you up in a specified number of seconds in the future.  This allows taking actions in the future.  The wakeup message will appear with the user role but will look something like WAKEUP:<message>.  Multiple wakeup messages are supported
              add_text_to_debug("Unknown function: " + name);
              return "Unknown function: " + name;
          case "get_available_mavlink_messages":
              return get_available_mavlink_messages();
          default:
              add_text_to_debug("Unknown function: " + name);
              return "Unknown function: " + name;
      }
  }

    // function calls below here
    // returns "Copter", "Plane", "Rover", "Boat", etc or "Unknown"
    function get_vehicle_type() {

        // get the latest HEARTBEAT message and perform a sanity check
        let heartbeat_msg = mavlink_store.get_latest_message(0);
        //add_text_to_debug("get_vehicle_type: got latest msg" + JSON.stringify(heartbeat_msg));
        if (!heartbeat_msg || !heartbeat_msg.hasOwnProperty("type")) {
            return "unknown because no HEARTBEAT message has been received from the vehicle";
        }
        let vehicle_type = heartbeat_msg["type"];

        // get the vehicle type from the heartbeat message's type field
        switch (vehicle_type) {
            case mavlink20.MAV_TYPE_FIXED_WING:
            case mavlink20.MAV_TYPE_VTOL_DUOROTOR:
            case mavlink20.MAV_TYPE_VTOL_QUADROTOR:
            case mavlink20.MAV_TYPE_VTOL_TILTROTOR:
                return "Plane"
            case mavlink20.MAV_TYPE_GROUND_ROVER:
                return "Rover";
            case mavlink20.MAV_TYPE_SURFACE_BOAT:
                return "Boat";
            case mavlink20.MAV_TYPE_SUBMARINE:
                return "Sub";
            case mavlink20.MAV_TYPE_QUADROTOR:

function get_all_parameters() {
    // Check if any parameters are available
    const param_message = mavlink_store.get_latest_message(22); // 22 is PARAM_VALUE
    if (!param_message) {
        return JSON.stringify({
            error: "No parameters available. Parameters haven't been received from the vehicle yet."
        });
    }
    
    // We need to collect all parameters from the store
    let param_list = {};
    
    // MAVLink store organizes by system_id, component_id, and message_id
    const systems = Object.keys(mavlink_store.store);
    for (const sysid of systems) {
        const components = Object.keys(mavlink_store.store[sysid]);
        for (const compid of components) {
            // Check if this system/component has parameter messages
            if (mavlink_store.store[sysid][compid] && 
                mavlink_store.store[sysid][compid][22]) { // 22 = PARAM_VALUE
                
                // Parameters are stored individually - we'll need to collect them all
                const messages = mavlink_store.store[sysid][compid][22];
                
                // Handle single messages and arrays of messages
                if (Array.isArray(messages)) {
                    for (const msg of messages) {
                        if (msg.param_id) {
                            param_list[msg.param_id] = msg.param_value;
                        }
                    }
                } else if (messages.param_id) {
                    // Single message
                    param_list[messages.param_id] = messages.param_value;
                }
            }
        }
    }
    
    // If no parameters found after checking
    if (Object.keys(param_list).length === 0) {
        return JSON.stringify({
            error: "No parameter data found in MAVLink store"
        });
    }
    
    // Return parameters as JSON string
    return JSON.stringify(param_list);
}

function get_parameter(args) {
    // Parse arguments if needed
    if (typeof args === 'string') {
        try {
            args = JSON.parse(args);
        } catch (e) {
            return JSON.stringify({ error: "Invalid arguments format" });
        }
    }
    
    // Get parameter name
    const param_name = args?.name;
    if (!param_name) {
        return JSON.stringify({ error: "get_parameter: name not specified" });
    }
    
    // Start with empty parameter list
    let param_list = {};
    
    // Check if parameter name contains regex
    const contains_regex = /[.*+?^${}()|[\]\\]/.test(param_name);
    
    if (contains_regex) {
        try {
            // Create regex pattern
            const pattern = new RegExp(param_name);
            
            // Get all parameters
            const all_params_str = get_all_parameters();
            let all_params;
            try {
                all_params = JSON.parse(all_params_str);
            } catch (e) {
                return JSON.stringify({ error: "Failed to parse parameters" });
            }
            
            // If there was an error getting parameters
            if (all_params.error) {
                return JSON.stringify({ error: all_params.error });
            }
            
            // Find matching parameters
            for (const [existing_param_name, param_value] of Object.entries(all_params)) {
                if (pattern.test(existing_param_name)) {
                    param_list[existing_param_name] = param_value;
                }
            }
            
            // Return error if no matches found
            if (Object.keys(param_list).length === 0) {
                return JSON.stringify({ error: "No parameters match pattern: " + param_name });
            }
        } catch (e) {
            return JSON.stringify({ error: "Invalid regex pattern: " + e.message });
        }
    } else {
        // Handle simple case of a single parameter name
        // Get the parameter message (ID 22 is PARAM_VALUE)
        const systems = Object.keys(mavlink_store.store);
        let param_found = false;
        
        // Search through all systems and components
        for (const sysid of systems) {
            const components = Object.keys(mavlink_store.store[sysid]);
            for (const compid of components) {
                if (mavlink_store.store[sysid][compid][22]) {
                    const messages = mavlink_store.store[sysid][compid][22];
                    
                    // Handle both single messages and arrays
                    if (Array.isArray(messages)) {
                        for (const msg of messages) {
                            if (msg.param_id === param_name) {
                                param_list[param_name] = msg.param_value;
                                param_found = true;
                                break;
                            }
                        }
                    } else if (messages.param_id === param_name) {
                        param_list[param_name] = messages.param_value;
                        param_found = true;
                    }
                    
                    if (param_found) break;
                }
            }
            if (param_found) break;
        }
        
        if (!param_found) {
            return JSON.stringify({ error: "get_parameter: " + param_name + " parameter not found" });
        }
    }
    
    return JSON.stringify(param_list);
}

function get_parameter_description(args) {
    // Parse arguments if needed
    if (typeof args === 'string') {
        try {
            args = JSON.parse(args);
        } catch (e) {
            return JSON.stringify({ error: "Invalid arguments format" });
        }
    }
    
    // Get parameter name
    const param_name = args?.name;
    if (!param_name) {
        return JSON.stringify({ error: "get_parameter_description: name not specified" });
    }
    
    // Start with empty parameter descriptions object
    let param_descriptions = {};
    
    // Check if parameter name contains regex
    const contains_regex = /[.*+?^${}()|[\]\\]/.test(param_name);
    
    // Get vehicle type to determine which parameter set to use
    const vehicle_type = get_vehicle_type();
    
    if (contains_regex) {
        try {
            // Create regex pattern
            const pattern = new RegExp(param_name);
            
            // Get all parameters to check against
            const all_params_str = get_all_parameters();
            let all_params;
            try {
                all_params = JSON.parse(all_params_str);
            } catch (e) {
                return JSON.stringify({ error: "Failed to parse parameters" });
            }
            
            // If there was an error getting parameters
            if (all_params.error) {
                return JSON.stringify({ error: all_params.error });
            }
            
            // Find matching parameters and get descriptions
            for (const existing_param_name of Object.keys(all_params)) {
                if (pattern.test(existing_param_name)) {
                    const param_desc = get_single_parameter_description(vehicle_type, existing_param_name);
                    if (param_desc) {
                        param_descriptions[existing_param_name] = param_desc;
                    }
                }
            }
            
            // Return error if no descriptions found
            if (Object.keys(param_descriptions).length === 0) {
                return JSON.stringify({ 
                    error: "No parameter descriptions found matching pattern: " + param_name 
                });
            }
        } catch (e) {
            return JSON.stringify({ error: "Invalid regex pattern: " + e.message });
        }
    } else {
        // Handle simple case of a single parameter name
        const param_desc = get_single_parameter_description(vehicle_type, param_name);
        if (!param_desc) {
            return JSON.stringify({ 
                error: "get_parameter_description: " + param_name + " parameter description not found" 
            });
        }
        param_descriptions[param_name] = param_desc;
    }
    
    return JSON.stringify(param_descriptions);
}

function get_vehicle_location_and_yaw() {
    // Get the latest GLOBAL_POSITION_INT message (ID 33)
    const position_msg = mavlink_store.get_latest_message(33);
    
    // Sanity check that we have a position message
    if (!position_msg) {
        return JSON.stringify({
            error: "No position data available. GLOBAL_POSITION_INT message hasn't been received yet."
        });
    }
    
    // Get the latest ATTITUDE message for yaw (if available)
    const attitude_msg = mavlink_store.get_latest_message(30);
    
    // Convert lat/lon from int32 (degE7) to decimal degrees
    const lat = position_msg.lat / 10000000.0;
    const lon = position_msg.lon / 10000000.0;
    
    // Create the response object
    const response = {
        latitude: lat,
        longitude: lon,
        altitude_amsl: position_msg.alt / 1000.0,         // mm to meters
        altitude_above_home: position_msg.relative_alt / 1000.0,  // mm to meters
        heading: position_msg.hdg / 100.0                // centi-degrees to degrees
    };
    
    // Add attitude information if available
    if (attitude_msg) {
        response.yaw = attitude_msg.yaw * (180 / Math.PI);  // radians to degrees
    }
    
    return JSON.stringify(response);
}

// Helper function used by both location functions
function get_latitude_longitude_given_offset(lat, lon, north_meters, east_meters) {
    // Earth's radius in meters
    const EARTH_RADIUS = 6378137.0;
    
    // Convert latitude and longitude from degrees to radians
    const lat_rad = lat * (Math.PI / 180);
    const lon_rad = lon * (Math.PI / 180);
    
    // Calculate new latitude
    const new_lat_rad = lat_rad + north_meters / EARTH_RADIUS;
    
    // Calculate new longitude (accounting for latitude)
    const new_lon_rad = lon_rad + east_meters / (EARTH_RADIUS * Math.cos(lat_rad));
    
    // Convert back to degrees
    const new_lat = new_lat_rad * (180 / Math.PI);
    const new_lon = new_lon_rad * (180 / Math.PI);
    
    return [new_lat, new_lon];
}

function get_location_plus_offset(args) {
    // Parse arguments if needed
    if (typeof args === 'string') {
        try {
            args = JSON.parse(args);
        } catch (e) {

        }
    }

    const lat = args?.latitude || 0;
    const lon = args?.longitude || 0;
    const dist_north = args?.distance_north || 0;
    const dist_east = args?.distance_east || 0;
    
    // Calculate new position
    const [lat_with_offset, lon_with_offset] = get_latitude_longitude_given_offset(lat, lon, dist_north, dist_east);

    });

function get_location_plus_dist_at_bearing(args) {
    // Parse arguments if needed
    if (typeof args === 'string') {
        try {
            args = JSON.parse(args);
        } catch (e) {
            return JSON.stringify({ error: "Invalid arguments format" });
        }
    }
    
    // Get parameters from args
    const lat = args?.latitude || 0;
    const lon = args?.longitude || 0;
    const distance = args?.distance || 0;
    const bearing_deg = args?.bearing || 0;
    
    // Convert bearing to north/east components
    const bearing_rad = bearing_deg * (Math.PI / 180);
    const dist_north = Math.cos(bearing_rad) * distance;
    const dist_east = Math.sin(bearing_rad) * distance;
    
    // Calculate new position
    const [lat_with_offset, lon_with_offset] = get_latitude_longitude_given_offset(lat, lon, dist_north, dist_east);
    
    // Return result
    return JSON.stringify({
        latitude: lat_with_offset,
        longitude: lon_with_offset
    });
}

function send_mavlink_command_int(args) {
    // Parse arguments if needed
    if (typeof args === 'string') {
        try {
            args = JSON.parse(args);
        } catch (e) {
            add_text_to_debug("Error parsing args: " + e.message);
            return "Error: Invalid arguments format";
        }
    }

    // Check WebSocket connection
    if (!window.mavlink_ws || window.mavlink_ws.readyState !== WebSocket.OPEN) {
        add_text_to_debug("WebSocket not connected");
        return "Error: WebSocket not connected";
    }

    // Extract arguments with defaults
    const target_system = args.target_system || 1;
    const target_component = args.target_component || 1;
    const frame = args.frame || 0;
    
    if (!args.command) {
        add_text_to_debug("Error: command field required");
        return "Error: command field required";
    }

    // Convert parameters to proper numeric types
    const command = Number(args.command);
    const current = Number(args.current || 0);
    const autocontinue = Number(args.autocontinue || 0);
    const param1 = Number(args.param1 || 0);
    const param2 = Number(args.param2 || 0);
    const param3 = Number(args.param3 || 0);
    const param4 = Number(args.param4 || 0);
    const x = Number(args.x || 0);
    const y = Number(args.y || 0);
    const z = Number(args.z || 0);

    try {
        let mavlink_message;
        
        // Special handling for MAV_CMD_DO_SET_MODE (176)
        if (command === 176) { // MAV_CMD_DO_SET_MODE
            add_text_to_debug("Mode change detected, using COMMAND_LONG instead");

            mavlink_message = new mavlink20.messages.command_long(
                target_system,
                target_component,
                command,
                1, // Confirmation
                param1, // Base mode (MAV_MODE)
                param2, // Custom mode
                param3, // Sub-mode (if required)
                0, 0, 0, 0 // Unused parameters
            );

            add_text_to_debug(`Sent mode change command: base_mode=${param1}, custom_mode=${param2}`);
        } else {
            // Default case: Send as COMMAND_INT
            mavlink_message = new mavlink20.messages.command_int(
                target_system,
                target_component,
                frame,
                command,
                current,
                autocontinue,
                param1,
                param2,
                param3,
                param4,
                x,
                y,
                z
            );

            add_text_to_debug(`Sent COMMAND_INT: cmd=${command}, x=${x}, y=${y}, z=${z}`);
        }

        // Send the message
        // const buffer = MAVLink.send(mavlink_message);
        const buffer = window.MAVLink.send(mavlink_message);
        window.mavlink_ws.send(new Uint8Array(buffer));

        return "Command sent successfully";
    } catch (error) {
        add_text_to_debug("Error sending command: " + error.message);
        return "Error: " + error.message;
    }
}


function set_parameter(args) {
    // Parse arguments if they are a JSON string
    if (typeof args === 'string') {
        try {
            args = JSON.parse(args);
        } catch (e) {
            return JSON.stringify({ error: "Invalid arguments format: not valid JSON" });
        }
    }

    // Extract required parameters
    const param_name = args?.name;
    const param_value = args?.value;

    // Validate required parameters
    if (!param_name) {
        return JSON.stringify({ error: "set_parameter: Parameter name not specified" });
    }

    if (param_value === undefined) {
        return JSON.stringify({ error: "set_parameter: Parameter value not specified" });
    }

    // Check WebSocket connection
    if (!mavlink_ws || mavlink_ws.readyState !== WebSocket.OPEN) {
        return JSON.stringify({ error: "WebSocket not connected. Please connect to vehicle first." });
    }

    try {
        // Ensure the parameter name is exactly 16 characters (MAVLink limitation)
        const param_name_fixed = param_name.padEnd(16, '\0').slice(0, 16);

        // Determine the parameter type
        let param_type;
        let param_value_converted;

        if (typeof param_value === 'number') {
            if (Number.isInteger(param_value)) {
                param_type = mavlink20.MAV_PARAM_TYPE_INT32;
                param_value_converted = param_value;
            } else {
                param_type = mavlink20.MAV_PARAM_TYPE_REAL32;
                param_value_converted = param_value;
            }
        } else if (typeof param_value === 'string') {
            param_type = mavlink20.MAV_PARAM_TYPE_UINT8;
            param_value_converted = param_value.charCodeAt(0);
        } else {
            return JSON.stringify({ error: "Unsupported parameter value type" });
        }

        // Create PARAM_SET message
        let param_set_msg = new mavlink20.messages.param_set(
            1,                  // Target system ID
            1,                  // Target component ID
            param_name_fixed,   // Fixed-length parameter name
            param_value_converted, // Parameter value
            param_type          // Parameter type
        );

        // Encode and send message via WebSocket
        const buffer = MAVLink.send(param_set_msg);
        const uint = new Uint8Array(buffer);
        mavlink_ws.send(uint);

        // Debug log
        add_text_to_debug(`Sent PARAM_SET: ${param_name} = ${param_value}`);

        return JSON.stringify({
            result: "Parameter set command sent successfully",
            details: {
                name: param_name,
                value: param_value
            }
        });
    } catch (error) {
        return JSON.stringify({ error: `Failed to set parameter: ${error.message}` });
    }
}

function get_wakeup_timers(args) {
    // Parse arguments if needed
    if (typeof args === 'string') {
        try {
            args = JSON.parse(args);
        } catch (e) {
            return "Error: Invalid arguments format";
        }
    }
    
    // Extract the message filter pattern if provided
    const message_pattern = args?.message;
    
    // If no timers exist, return empty array
    if (!wakeup_timers || wakeup_timers.length === 0) {
        return "No active wakeup timers";
    }
    
    // If a message pattern is provided, filter the timers
    if (message_pattern) {
        try {
            const pattern = new RegExp(message_pattern);
            const filtered_timers = wakeup_timers.filter(timer => 
                pattern.test(timer.message)
            );
            
            if (filtered_timers.length === 0) {
                return "No timers match the pattern: " + message_pattern;
            }
            
            // Return filtered timers with readable time information
            const formatted_timers = filtered_timers.map(timer => ({
                id: timer.id,
                message: timer.message,
                seconds_remaining: Math.max(0, Math.round((timer.expiry_time - new Date()) / 1000)),
                expires_at: timer.expiry_time.toLocaleString()
            }));
            
            return JSON.stringify(formatted_timers);
        } catch (e) {
            return "Error: Invalid regex pattern: " + e.message;
        }
    }
    
    // Return all timers with readable time information
    const formatted_timers = wakeup_timers.map(timer => ({
        id: timer.id,
        message: timer.message,
        seconds_remaining: Math.max(0, Math.round((timer.expiry_time - new Date()) / 1000)),
        expires_at: timer.expiry_time.toLocaleString()
    }));
    
    return JSON.stringify(formatted_timers);
}

  class EventHandler extends EventEmitter {
        constructor(client) {
            super()
            this.client = client;
        }

        async onEvent(event) {
            try {
                // print status on html page
                document.getElementById("assistantRunStatus").value = event.event;

                // handle each event
                switch (event.event) {
                // retrieve events that are denoted with 'requires_action'
                // since these will have our tool_calls
                case "thread.run.requires_action":
                    await this.handleRequiresAction(
                        event.data,
                        event.data.id,
                        event.data.thread_id,
                    )
                    break;
                case "thread.message.delta":
                case "thread.run.step.delta":
                    let delta_text = event.data.delta.content[0].text.value
                    add_text_to_chat(delta_text, "assistant")
                    break;

                // events below can be ignored
                case "thread.created":
                case "thread.message.completed":
                case "thread.run.created":
                case "thread.run.queued":
                case "thread.run.in_progress":
                case "thread.run.completed":
                case "thread.run.incomplete":
                case "thread.run.failed":
                case "thread.run.step.created":
                case "thread.run.cancelling":
                case "thread.run.step.in_progress":
                case "thread.run.cancelled":
                case "thread.run.expired":
                case "thread.run.step.created":
                case "thread.run.step.in_progress":
                case "thread.run.step.completed":
                case "thread.run.step.failed":
                case "thread.run.step.cancelled":
                case "thread.run.step.expired":
                case "thread.message.created":
                case "thread.message.in_progress":
                case "thread.message.completed":
                case "thread.message.incomplete":
                case "error":
                case "done":
                    break;

                // catch unhandled events
                default:
                    add_text_to_debug("Unhandled event: " + event.event)
                    console.log(event)
                }

            } catch (error) {
                console.error("Error handling event:", error)
            }
        }

        async handleRequiresAction(data, runId, threadId) {
    try {
        add_text_to_debug("Processing function calls: " + 
            JSON.stringify(data.required_action.submit_tool_outputs.tool_calls.map(c => c.function.name)));
        
        const toolOutputs = data.required_action.submit_tool_outputs.tool_calls.map((toolCall) => {
            add_text_to_debug("Calling function: " + toolCall.function.name);
            add_text_to_debug("With args: " + toolCall.function.arguments);
            
            let output;
            try {
                output = handle_function_call(toolCall.function.name, toolCall.function.arguments);
                // Check if output is already a string
                if (typeof output !== 'string') {
                    output = JSON.stringify(output);
                }
                add_text_to_debug("Function returned: " + output);
            } catch (err) {
                add_text_to_debug("ERROR in function call: " + err.message);
                output = JSON.stringify({error: err.message});
            }
            
            return {
                tool_call_id: toolCall.id,
                output: output
            }
        });
        
        add_text_to_debug("Submitting tool outputs: " + JSON.stringify(toolOutputs));
        await this.submitToolOutputs(toolOutputs, runId, threadId);
    } catch (error) {
        add_text_to_debug("ERROR in handleRequiresAction: " + error.message);
        console.error("Error processing required action:", error);
    }
}

        // return function call results to the assistant
        async submitToolOutputs(toolOutputs, runId, threadId) {
            try {
                // use the submitToolOutputsStream helper
                const stream = this.client.beta.threads.runs.submitToolOutputsStream(
                    threadId,
                    runId,
                    { tool_outputs: toolOutputs },
                )
                for await (const event of stream) {
                    this.emit("event", event)
                }
            } catch (error) {
                console.error("Error submitting tool outputs:", error)
            }
        }
    }
